# Prefer tmux’s own terminfo entry
set -g default-terminal "tmux-256color"

# Advertise truecolor to apps inside tmux
# tmux 3.2+ prefers terminal-features over terminal-overrides
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"

# If sometimes connecting from different $TERM values, this is a catch-all:
# Only use if terminal-features does not work
# set -as terminal-overrides ",*:Tc"  # or ",*256col*:Tc"

# set -g prefix C-a
# unbind C-b
# bind-key C-a send-prefix

set -g base-index 1   # start indexing windows at 1 instead of 0
setw -g pane-base-index 1  # start indexing panes at 1 instead of 0
set -g detach-on-destroy off  # don't exit from tmux when closing a session
set -g escape-time 0  # zero-out escape time delay
set -g renumber-windows on  # renumber all windows when any window is closed
set -g set-clipboard on  # use system clipboard
set -g status-position top  # macOs / darwin style
set -g allow-passthrough on

# vim behavior
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi v send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi V send -X select-line # select line with "V"
bind-key -T copy-mode-vi y send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse

# window split and sizing controls
unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z   # fullscreen
set -g mouse on


# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v0.2.0'
set -g @plugin 'christoomey/vim-tmux-navigator' # for navigating panes and vim/nvim with Ctrl-hjkl
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin 'tmux-plugins/tmux-sensible'

# plugin configurations
set -g @resurrect-capture-pane-contents 'on' # allow tmux-resurrect to capture pane contents
set -g @continuum-restore 'on' # enable tmux-continuum functionality

# catppuccin theme configuration
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(🔎),}"
set -g @catppuccin_status_modules_right "directory host"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"

# Make the active pane more abvious
set-option -g pane-active-border-style fg=white
set-option -g pane-border-lines double
set-option -g pane-border-indicators arrows
set-option -g pane-border-status top

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
